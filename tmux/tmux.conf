set -g prefix S-F7 # F19 in karabiner
bind-key S-F7 select-pane -t :.+

set -g mouse on
# Smart scroll: make mouse wheel work both for TUI apps and tmux scrollback.
#
# When a TUI app (e.g. opencode, vim, less) enables mouse reporting,
# mouse_any_flag is set to 1 and scroll events are forwarded directly to
# the app via send-keys -M.
#
# When the pane is running a plain shell (mouse_any_flag=0), scroll up
# enters tmux copy-mode so you can scroll through the scrollback buffer.
#
# -F  = evaluate the condition as a tmux format string (not a shell command)
# -t= = target the pane under the mouse cursor
bind -n WheelUpPane   if-shell -Ft= "#{mouse_any_flag}" "send-keys -M" "select-pane -t=; copy-mode -e; send-keys -M"
bind -n WheelDownPane if-shell -Ft= "#{mouse_any_flag}" "send-keys -M" "select-pane -t=; send-keys -M"

set -sg escape-time 0
set -g renumber-windows on
set -g focus-events on

set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
